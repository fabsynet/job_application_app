# Alembic config for job-app (Phase 1 baseline).
#
# The production runtime uses the async aiosqlite driver (see app/db/base.py),
# but Alembic itself runs its migrations through the sync SQLite driver — this
# keeps env.py straightforward. Both URLs point at the same ./data/app.db file.

[alembic]
script_location = app/db/migrations
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url = sqlite:///./data/app.db


[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
